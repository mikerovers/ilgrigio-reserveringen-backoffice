      - key: APP_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: APP_NAME
        value: "Il Grigio Reserveringen"
        scope: RUN_AND_BUILD_TIME
      - key: MAILER_DSN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: MAILER_FROM_EMAIL
        value: ses@ilgrigio.nl
        scope: RUN_AND_BUILD_TIME
      - key: MAILER_FROM_NAME
        value: "Il Grigio Reserveringen"
        scope: RUN_AND_BUILD_TIME
      - key: ADMIN_EMAIL
        value: reserveringen@ilgrigio.nl
        scope: RUN_AND_BUILD_TIME
      - key: WOOCOMMERCE_CONSUMER_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: WOOCOMMERCE_CONSUMER_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: WOOCOMMERCE_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: ILGRIGIO_BASE_URL
        value: https://backoffice.ilgrigio.nl
        scope: RUN_AND_BUILD_TIME
      - key: ILGRIGIO_BASE_API_URL
        value: https://backoffice.ilgrigio.nl/wp-json
        scope: RUN_AND_BUILD_TIME
      - key: ILGRIGIO_RESERVERINGEN_BASE_URL
        value: https://reserveringen.ilgrigio.nl
