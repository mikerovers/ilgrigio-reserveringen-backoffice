# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Trust the DigitalOcean App Platform edge proxy. The container is never
    # reachable directly (only via the platform's edge/load balancer), and the
    # edge's source IP is not a fixed or private range, so it must be trusted
    # unconditionally here; trusted_headers below limits what is actually read.
    trusted_proxies: '0.0.0.0/0,::/0'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-proto', 'x-forwarded-port']

    # Note that the session will be started ONLY if you read or write from it.
    session:
        cookie_path: /
        cookie_samesite: lax
        cookie_secure: auto

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
